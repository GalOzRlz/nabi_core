[[program]]
function = "morph2"
name = "morph2 A"
tuning = "just intonation"
[program.sound.values]
osc1_a = "hammond"
osc2_a = "square"
[program.effects]
chain = ["eq2", "reverb"]
[program.effects.configs.reverb.values]
room_size = 4.0
damping   = 0.8
length    = 1.3
"%" = 0.5
[program.effects.configs.reverb.mapping]
"%" = 1
length = 2
[program.effects.configs.eq2.values]
lowcut = 0.0
highcut = 1.0