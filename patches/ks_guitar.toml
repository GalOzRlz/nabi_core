[[program]]
function = "karplus_strong_comb"
name = "KS Guitar"
[program.effects]
chain = ["eq2", "tape_drift", "reverb"]
[program.effects.configs.reverb.values]
room_size = 5.0
damping   = 0.7
length    = 1.5
# CC‑mappable parameter: wet_amount
wet_amount = 0.5
[program.effects.configs.eq2.values]
lowcut = 0.0
highcut = 1.0